name: CI/CD Pipeline - VisualWorld

on:
  push:
    branches:
      - main      # Production uniquement pour le moment
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '18.20.8'

jobs:
  # Job 1: Tests et Build du Frontend
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      
      - name: Setup Node.js v18.20.8
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.8'
      
      - name: Installation des dépendances Frontend
        working-directory: ./front
        run: npm ci --legacy-peer-deps
      
      - name: Lint Frontend
        working-directory: ./front
        run: npm run lint || true

  # Job 2: Tests de l'API
  api-test:
    name: Test API
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      
      - name: Setup Node.js v18.20.8
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.8'
      
      - name: Installation des dépendances API
        working-directory: ./api
        run: npm ci
      
      - name: Lint API
        working-directory: ./api
        run: npm run lint || true

  # Job 3: Déploiement sur PRODUCTION
  deploy-prod:
    name: Déploiement PRODUCTION
    runs-on: ubuntu-latest
    needs: [frontend-build, api-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: http://damien.konatus.site
    
    steps:
      - name: Déploiement PROD via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            echo "🚀 Déploiement PRODUCTION..."
            
            # Variables
            APP_DIR="/root/visualworld-main"
            BACKUP_DIR="/root/visualworld-backups"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            
            # Créer le dossier de backup
            mkdir -p $BACKUP_DIR
            
            # Backup de la base de données SQLite
            if [ -f "$APP_DIR/visualworld.db" ]; then
              echo "📦 Backup de la base de données..."
              cp $APP_DIR/visualworld.db $BACKUP_DIR/visualworld_$TIMESTAMP.db
              # Garder seulement les 10 derniers backups
              ls -t $BACKUP_DIR/visualworld_*.db | tail -n +11 | xargs -r rm
            fi
            
            # Pull des dernières modifications
            cd $APP_DIR
            git fetch origin main
            git reset --hard origin/main
            
            # Installation des dépendances API avec Node 18.20.8
            echo "📦 Installation des dépendances API..."
            cd $APP_DIR/api
            npm install
            
            # Installation des dépendances Frontend avec Node 18.20.8
            echo "📦 Installation des dépendances Frontend..."
            cd $APP_DIR/front
            npm install --legacy-peer-deps
            
            # Redémarrage des services avec PM2
            echo "🔄 Redémarrage des services..."
            pm2 restart visualworld-api || pm2 start npm --name visualworld-api -- start --prefix $APP_DIR/api
            pm2 restart visualworld-front || pm2 start npm --name visualworld-front -- run serve --prefix $APP_DIR/front
            pm2 save
            
            echo "✅ Déploiement PRODUCTION terminé avec succès!"
      
      - name: Vérification de santé
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "🏥 Vérification de la santé de l'application..."
            sleep 10
            
            # Vérifier avec PM2
            if pm2 list | grep -q "visualworld-api.*online"; then
              echo "✅ API est en cours d'exécution"
            else
              echo "❌ API n'est pas en cours d'exécution"
              pm2 logs visualworld-api --lines 50
              exit 1
            fi
            
            if pm2 list | grep -q "visualworld-front.*online"; then
              echo "✅ Frontend est en cours d'exécution"
            else
              echo "❌ Frontend n'est pas en cours d'exécution"
              pm2 logs visualworld-front --lines 50
              exit 1
            fi
            
            # Vérifier les ports
            if ss -tlnp | grep :8080 > /dev/null; then
              echo "✅ Port 8080 (API) est ouvert"
            else
              echo "⚠️  Port 8080 (API) n'est pas ouvert"
            fi
            
            if ss -tlnp | grep :3333 > /dev/null; then
              echo "✅ Port 3333 (Frontend) est ouvert"
            else
              echo "⚠️  Port 3333 (Frontend) n'est pas ouvert"
            fi
            
            echo "✅ Déploiement validé!"
            pm2 status

  # Job 4: Notification
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [deploy-prod]
    if: always()
    
    steps:
      - name: Notification de succès PROD
        if: needs.deploy-prod.result == 'success'
        run: echo "✅ Déploiement PRODUCTION réussi sur http://damien.konatus.site/"
      
      - name: Notification d'échec
        if: needs.deploy-prod.result == 'failure'
        run: |
          echo "❌ Le déploiement PRODUCTION a échoué"
          exit 1
