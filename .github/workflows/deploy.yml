name: CI/CD Pipeline - VisualWorld

on:
  push:
    branches:
      - main      # Production
      - test      # Test
      - dev       # Development
  pull_request:
    branches:
      - main
      - test
      - dev

env:
  NODE_VERSION: '18.20.8'

jobs:
  # Job 1: Tests et Build du Frontend
  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      
      - name: Setup Node.js v18.20.8
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.8'
      
      - name: Installation des dépendances Frontend
        working-directory: ./front
        run: npm ci --legacy-peer-deps
      
      - name: Lint Frontend
        working-directory: ./front
        run: npm run lint || true

  # Job 2: Tests de l'API
  api-test:
    name: Test API
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
      
      - name: Setup Node.js v18.20.8
        uses: actions/setup-node@v4
        with:
          node-version: '18.20.8'
      
      - name: Installation des dépendances API
        working-directory: ./api
        run: npm ci
      
      - name: Lint API
        working-directory: ./api
        run: npm run lint || true

  # Job 3: Déploiement sur DEV
  deploy-dev:
    name: Déploiement DEV
    runs-on: ubuntu-latest
    needs: [frontend-build, api-test]
    if: github.ref == 'refs/heads/dev' && github.event_name == 'push'
    environment:
      name: development
      url: http://dev.damien.konatus.site
    
    steps:
      - name: Déploiement DEV via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            echo "🔧 Déploiement DEV..."
            
            # Se déplacer dans le répertoire DEV
            cd /root/visualworld-dev
            
            # Pull des dernières modifications
            git fetch origin dev
            git reset --hard origin/dev
            
            # Installation des dépendances API
            echo "📦 Installation des dépendances API..."
            cd /root/visualworld-dev/api
            npm install
            
            # Installation des dépendances Frontend
            echo "📦 Installation des dépendances Frontend..."
            cd /root/visualworld-dev/front
            npm install --legacy-peer-deps
            
            # Redémarrage des services avec PM2
            echo "🔄 Redémarrage des services DEV..."
            pm2 restart visualworld-api-dev visualworld-front-dev --update-env || \
            (pm2 start /root/visualworld-dev/ecosystem.config.json && pm2 save)
            
            echo "✅ Déploiement DEV terminé avec succès!"
            pm2 list | grep -E "visualworld.*dev"

  # Job 4: Déploiement sur TEST
  deploy-test:
    name: Déploiement TEST
    runs-on: ubuntu-latest
    needs: [frontend-build, api-test]
    if: github.ref == 'refs/heads/test' && github.event_name == 'push'
    environment:
      name: test
      url: http://test.damien.konatus.site
    
    steps:
      - name: Déploiement TEST via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            echo "🧪 Déploiement TEST..."
            
            # Se déplacer dans le répertoire TEST
            cd /root/visualworld-test
            
            # Pull des dernières modifications
            git fetch origin test
            git reset --hard origin/test
            
            # Installation des dépendances API
            echo "📦 Installation des dépendances API..."
            cd /root/visualworld-test/api
            npm install
            
            # Installation des dépendances Frontend
            echo "📦 Installation des dépendances Frontend..."
            cd /root/visualworld-test/front
            npm install --legacy-peer-deps
            
            # Redémarrage des services avec PM2
            echo "🔄 Redémarrage des services TEST..."
            pm2 restart visualworld-api-test visualworld-front-test --update-env || \
            (pm2 start /root/visualworld-test/ecosystem.config.json && pm2 save)
            
            echo "✅ Déploiement TEST terminé avec succès!"
            pm2 list | grep -E "visualworld.*test"

  # Job 5: Déploiement sur PRODUCTION
  deploy-prod:
    name: Déploiement PRODUCTION
    runs-on: ubuntu-latest
    needs: [frontend-build, api-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: http://damien.konatus.site
    
    steps:
      - name: Déploiement PROD via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            echo "🚀 Déploiement PRODUCTION..."
            
            # Variables
            APP_DIR="/root/visualworld-main"
            BACKUP_DIR="/root/visualworld-backups"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            
            # Créer le dossier de backup
            mkdir -p $BACKUP_DIR
            
            # Backup de la base de données SQLite
            if [ -f "$APP_DIR/visualworld.db" ]; then
              echo "📦 Backup de la base de données..."
              cp $APP_DIR/visualworld.db $BACKUP_DIR/visualworld_$TIMESTAMP.db
              # Garder seulement les 10 derniers backups
              ls -t $BACKUP_DIR/visualworld_*.db | tail -n +11 | xargs -r rm
            fi
            
            # Pull des dernières modifications
            cd $APP_DIR
            git fetch origin main
            git reset --hard origin/main
            
            # Installation des dépendances API avec Node 18.20.8
            echo "📦 Installation des dépendances API..."
            cd $APP_DIR/api
            npm install
            
            # Installation des dépendances Frontend avec Node 18.20.8
            echo "📦 Installation des dépendances Frontend..."
            cd $APP_DIR/front
            npm install --legacy-peer-deps
            
            # Redémarrage des services avec PM2
            echo "🔄 Redémarrage des services..."
            pm2 restart visualworld-api visualworld-front --update-env || \
            (pm2 start $APP_DIR/ecosystem.config.json && pm2 save)
            
            echo "✅ Déploiement PRODUCTION terminé avec succès!"
      
      - name: Vérification de santé PROD
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "🏥 Vérification de la santé de l'application..."
            sleep 10
            
            # Vérifier avec PM2
            if pm2 list | grep -q "visualworld-api.*online"; then
              echo "✅ API est en cours d'exécution"
            else
              echo "❌ API n'est pas en cours d'exécution"
              pm2 logs visualworld-api --lines 50
              exit 1
            fi
            
            if pm2 list | grep -q "visualworld-front.*online"; then
              echo "✅ Frontend est en cours d'exécution"
            else
              echo "❌ Frontend n'est pas en cours d'exécution"
              pm2 logs visualworld-front --lines 50
              exit 1
            fi
            
            # Vérifier les ports
            if ss -tlnp | grep :8080 > /dev/null; then
              echo "✅ Port 8080 (API) est ouvert"
            else
              echo "⚠️  Port 8080 (API) n'est pas ouvert"
            fi
            
            if ss -tlnp | grep :3333 > /dev/null; then
              echo "✅ Port 3333 (Frontend) est ouvert"
            else
              echo "⚠️  Port 3333 (Frontend) n'est pas ouvert"
            fi
            
            echo "✅ Déploiement validé!"
            pm2 status

  # Job 6: Notification
  notify:
    name: Notification
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-test, deploy-prod]
    if: always()
    
    steps:
      - name: Notification de succès DEV
        if: needs.deploy-dev.result == 'success'
        run: echo "✅ Déploiement DEV réussi sur http://dev.damien.konatus.site/"
      
      - name: Notification de succès TEST
        if: needs.deploy-test.result == 'success'
        run: echo "✅ Déploiement TEST réussi sur http://test.damien.konatus.site/"
      
      - name: Notification de succès PROD
        if: needs.deploy-prod.result == 'success'
        run: echo "✅ Déploiement PRODUCTION réussi sur http://damien.konatus.site/"
      
      - name: Notification d'échec
        if: |
          needs.deploy-dev.result == 'failure' ||
          needs.deploy-test.result == 'failure' ||
          needs.deploy-prod.result == 'failure'
        run: |
          echo "❌ Un ou plusieurs déploiements ont échoué"
          exit 1
